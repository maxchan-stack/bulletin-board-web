<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中正高中家長問答專區 - 快速解答指南</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* ==========================================================================
           DESIGN SYSTEM & CSS VARIABLES - NATIONAL PORTAL STYLE (教育部風格)
           ========================================================================== */
        :root {
            /* Light Mode - Standard National Portal Colors (綠、橘、白、灰) */
            --primary: #008060;
            --primary-light: #e5f2ee;
            --primary-dark: #004d3a;
            
            --secondary: #0066cc;
            
            --success: #2e7d32;
            --warning: #f57c00;
            --danger: #d32f2f;
            
            --bg-main: #f4f6f8;
            --bg-card: #ffffff;
            --border-color: #d1d5db;
            
            --text-main: #1f2937;
            --text-muted: #4b5563;
            
            --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            
            --border-radius-sm: 4px;
            --border-radius-md: 8px;
            --border-radius-lg: 12px;
            
            --transition-smooth: all 0.2s ease-in-out;
            
            --bg-image: 
                radial-gradient(circle at 50% 50%, rgba(255, 255, 255, 0.8) 0%, rgba(240, 242, 245, 0.3) 100%),
                repeating-linear-gradient(0deg, rgba(0, 0, 0, 0.02) 0px, rgba(0, 0, 0, 0.02) 1px, transparent 1px, transparent 4px),
                repeating-linear-gradient(90deg, rgba(0, 0, 0, 0.02) 0px, rgba(0, 0, 0, 0.02) 1px, transparent 1px, transparent 4px);
        }

        /* Dark Mode - Adaptive National Portal Style */
        body.dark-mode {
            --bg-main: #111827;
            --bg-card: #1f2937;
            --border-color: #374151;
            
            --text-main: #f9fafb;
            --text-muted: #9ca3af;
            
            --primary-light: #112a24;
            --primary-dark: #00a880;
            
            --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.3);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.4);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
            
            --bg-image: 
                radial-gradient(circle at 50% 50%, rgba(31, 41, 55, 0.8) 0%, rgba(17, 24, 39, 0.9) 100%),
                repeating-linear-gradient(0deg, rgba(255, 255, 255, 0.015) 0px, rgba(255, 255, 255, 0.015) 1px, transparent 1px, transparent 4px),
                repeating-linear-gradient(90deg, rgba(255, 255, 255, 0.015) 0px, rgba(255, 255, 255, 0.015) 1px, transparent 1px, transparent 4px);
        }

        /* ==========================================================================
           BASE STYLES
           ========================================================================== */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Noto Sans TC', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-main);
            background-image: var(--bg-image);
            color: var(--text-main);
            line-height: 1.6;
            overflow-x: hidden;
            transition: background-color 0.3s ease, color 0.3s ease, background-image 0.3s ease;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ==========================================================================
           HEADER
           ========================================================================== */
        .app-header {
            background-color: var(--bg-card);
            border-bottom: 2px solid var(--primary);
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: var(--shadow-sm);
            transition: var(--transition-smooth);
        }

        .header-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo-section {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .logo-icon {
            font-size: 2rem;
            color: var(--primary);
        }

        .title-text h1 {
            font-size: 1.35rem;
            font-weight: 700;
            color: var(--primary-dark);
        }

        body.dark-mode .title-text h1 {
            color: var(--primary-dark);
        }

        .title-text p {
            font-size: 0.8rem;
            color: var(--text-muted);
            font-weight: 500;
        }

        .theme-btn {
            background: var(--primary-light);
            border: 1px solid var(--primary);
            width: 38px;
            height: 38px;
            border-radius: 4px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--primary);
            font-size: 1rem;
            transition: var(--transition-smooth);
        }

        .theme-btn:hover {
            background: var(--primary);
            color: white;
        }

        body.dark-mode .theme-btn {
            background: #1f2937;
            border-color: var(--border-color);
            color: #fbbf24;
        }

        body.dark-mode .theme-btn i::before {
            content: "\f185";
        }

        /* ==========================================================================
           APP LAYOUT CONTAINER
           ========================================================================== */
        .app-container {
            max-width: 1200px;
            width: 100%;
            margin: 0 auto;
            padding: 2rem;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        /* ==========================================================================
           SEARCH SECTION
           ========================================================================== */
        .search-section {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            align-items: center;
            width: 100%;
        }

        .search-wrapper {
            position: relative;
            width: 100%;
            max-width: 800px;
            display: flex;
            align-items: center;
            box-shadow: var(--shadow-sm);
            border-radius: var(--border-radius-sm);
            border: 1px solid var(--border-color);
            background-color: var(--bg-card);
            transition: var(--transition-smooth);
        }

        .search-wrapper:focus-within {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(0, 128, 96, 0.15);
        }

        .search-icon {
            position: absolute;
            left: 1.25rem;
            color: var(--text-muted);
            font-size: 1.1rem;
            pointer-events: none;
        }

        #search-input {
            width: 100%;
            padding: 1rem 3rem;
            border: none;
            background: transparent;
            font-size: 1rem;
            color: var(--text-main);
            outline: none;
        }

        #search-input::placeholder {
            color: var(--text-muted);
            opacity: 0.8;
        }

        .clear-btn {
            position: absolute;
            right: 1rem;
            background: none;
            border: none;
            font-size: 1.1rem;
            color: var(--text-muted);
            cursor: pointer;
            transition: var(--transition-smooth);
        }

        .clear-btn:hover {
            color: var(--danger);
        }

        /* Popular tags */
        .popular-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            align-items: center;
            justify-content: center;
        }

        .tag-title {
            font-size: 0.8rem;
            color: var(--text-muted);
            font-weight: 600;
        }

        .hot-tag {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            padding: 0.3rem 0.8rem;
            border-radius: var(--border-radius-sm);
            font-size: 0.8rem;
            font-weight: 500;
            color: var(--text-muted);
            cursor: pointer;
            transition: var(--transition-smooth);
        }

        .hot-tag:hover {
            background: var(--primary-light);
            color: var(--primary);
            border-color: var(--primary);
        }

        /* ==========================================================================
           CATEGORY NAVIGATION
           ========================================================================== */
        .category-nav {
            display: flex;
            overflow-x: auto;
            padding-bottom: 0.25rem;
            gap: 0.5rem;
            justify-content: flex-start;
            -webkit-overflow-scrolling: touch;
        }

        .category-nav::-webkit-scrollbar {
            height: 4px;
        }
        .category-nav::-webkit-scrollbar-thumb {
            background-color: var(--border-color);
            border-radius: 4px;
        }

        @media(min-width: 900px) {
            .category-nav {
                justify-content: center;
            }
        }

        .category-btn {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            color: var(--text-muted);
            padding: 0.6rem 1.2rem;
            border-radius: var(--border-radius-sm);
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 0.4rem;
            white-space: nowrap;
            box-shadow: var(--shadow-sm);
            transition: var(--transition-smooth);
        }

        .category-btn:hover {
            color: var(--primary);
            background-color: var(--primary-light);
            border-color: var(--primary);
        }

        .category-btn.active {
            background-color: var(--primary);
            color: white;
            border-color: var(--primary);
            box-shadow: none;
        }

        /* ==========================================================================
           FAQ SECTION
           ========================================================================== */
        .faq-section {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 0.25rem;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 0.5rem;
        }

        #result-count {
            font-weight: 700;
            color: var(--text-main);
            font-size: 0.9rem;
        }

        .info-tip {
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .faq-list {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        /* FAQ CARD STYLING - FLAT SYSTEM */
        .faq-card {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--border-radius-sm);
            box-shadow: var(--shadow-sm);
            overflow: hidden;
            transition: var(--transition-smooth);
            border-left: 4px solid var(--primary);
        }

        .faq-card:hover {
            border-color: var(--primary);
            box-shadow: var(--shadow-md);
        }

        /* Color border indicators */
        .faq-card.leave { border-left-color: #0284c7; }
        .faq-card.academics { border-left-color: #7c3aed; }
        .faq-card.daily { border-left-color: #ea580c; }
        .faq-card.conduct { border-left-color: #dc2626; }
        .faq-card.safety { border-left-color: #16a34a; }

        .faq-question-btn {
            width: 100%;
            padding: 1.25rem;
            background: none;
            border: none;
            text-align: left;
            font-size: 1rem;
            font-weight: 700;
            color: var(--text-main);
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
        }

        .faq-question-btn:hover {
            background-color: var(--primary-light);
        }

        .faq-category-badge {
            font-size: 0.75rem;
            padding: 0.15rem 0.4rem;
            border-radius: 2px;
            font-weight: 700;
            margin-right: 0.5rem;
        }

        /* Flat badge colors */
        .leave .faq-category-badge { background-color: #e0f2fe; color: #0369a1; }
        .academics .faq-category-badge { background-color: #f3e8ff; color: #6d28d9; }
        .daily .faq-category-badge { background-color: #ffedd5; color: #c2410c; }
        .conduct .faq-category-badge { background-color: #fee2e2; color: #b91c1c; }
        .safety .faq-category-badge { background-color: #dcfce7; color: #15803d; }

        body.dark-mode .leave .faq-category-badge { background-color: #0c4a6e; color: #38bdf8; }
        body.dark-mode .academics .faq-category-badge { background-color: #3b0764; color: #c084fc; }
        body.dark-mode .daily .faq-category-badge { background-color: #7c2d12; color: #fb923c; }
        body.dark-mode .conduct .faq-category-badge { background-color: #7f1d1d; color: #f87171; }
        body.dark-mode .safety .faq-category-badge { background-color: #064e3b; color: #4ade80; }

        .faq-chevron {
            color: var(--text-muted);
            font-size: 0.9rem;
            transition: transform 0.2s ease-in-out;
        }

        .faq-card.open .faq-chevron {
            transform: rotate(180deg);
            color: var(--primary);
        }

        .faq-answer-container {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.2s ease-out;
        }

        .faq-answer-content {
            padding: 0 1.25rem 1.25rem 1.25rem;
            border-top: 1px solid var(--border-color);
            background-color: var(--bg-main);
        }

        body.dark-mode .faq-answer-content {
            background-color: #1f2937;
        }

        /* Quick Answer Section - Flat */
        .quick-answer {
            margin-top: 1rem;
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--border-radius-sm);
            padding: 1rem;
            border-left: 4px solid var(--primary);
        }

        .quick-answer-title {
            font-weight: 700;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 0.4rem;
            font-size: 0.9rem;
            margin-bottom: 0.4rem;
            border-bottom: 1px dashed var(--border-color);
            padding-bottom: 0.3rem;
        }

        .quick-answer p {
            font-size: 0.95rem;
            color: var(--text-main);
        }

        .quick-answer ul {
            margin-left: 1.25rem;
            margin-top: 0.3rem;
        }

        .quick-answer li {
            font-size: 0.9rem;
            color: var(--text-main);
        }

        /* Detailed Rule / Section reference */
        .detailed-rule {
            margin-top: 0.75rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.5rem 0.75rem;
            background-color: var(--bg-card);
            border: 1px dashed var(--border-color);
            border-radius: var(--border-radius-sm);
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .detailed-rule-title {
            display: flex;
            align-items: center;
            gap: 0.3rem;
            font-weight: 700;
            color: var(--primary);
        }

        /* Text Highlighting Search Match */
        mark {
            background-color: #fef08a;
            color: #1c1917;
            padding: 0 0.1rem;
            border-radius: 2px;
        }

        body.dark-mode mark {
            background-color: #ca8a04;
            color: #ffffff;
        }

        /* ==========================================================================
           NO RESULTS
           ========================================================================== */
        .no-results {
            text-align: center;
            padding: 3rem 1.5rem;
            background-color: var(--bg-card);
            border-radius: var(--border-radius-sm);
            border: 1px solid var(--border-color);
        }

        .no-results i {
            font-size: 2.5rem;
            color: var(--text-muted);
            margin-bottom: 1rem;
        }

        .no-results h3 {
            font-size: 1.2rem;
            margin-bottom: 0.5rem;
        }

        /* ==========================================================================
           AI WIDGET & CHAT WINDOW - FLAT DESIGN
           ========================================================================== */
        .ai-chat-widget {
            position: fixed;
            bottom: 1.5rem;
            right: 1.5rem;
            z-index: 1000;
        }

        .chat-toggle-btn {
            background-color: var(--primary);
            border: none;
            width: 50px;
            height: 50px;
            border-radius: 4px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.4rem;
            box-shadow: var(--shadow-md);
            position: relative;
            transition: var(--transition-smooth);
        }

        .chat-toggle-btn:hover {
            background-color: var(--primary-dark);
        }

        .chat-badge {
            position: absolute;
            top: -5px;
            right: -5px;
            background-color: var(--warning);
            color: white;
            font-size: 0.7rem;
            font-weight: 700;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .chat-window {
            position: absolute;
            bottom: 60px;
            right: 0;
            width: 360px;
            height: 480px;
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow-lg);
            border-radius: var(--border-radius-sm);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            opacity: 0;
            transform: translateY(10px);
            pointer-events: none;
            transition: all 0.2s ease-in-out;
        }

        .chat-window.open {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
        }

        .chat-header {
            background-color: var(--primary);
            padding: 0.75rem 1rem;
            color: white;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            position: relative;
        }

        .ai-avatar {
            font-size: 1.1rem;
        }

        .ai-title h4 {
            font-size: 0.9rem;
            font-weight: 700;
        }

        .ai-title p {
            font-size: 0.7rem;
            display: flex;
            align-items: center;
            gap: 0.25rem;
        }

        .status-dot {
            width: 6px;
            height: 6px;
            background-color: #4ade80;
            border-radius: 50%;
        }

        .close-chat {
            position: absolute;
            right: 1rem;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: white;
            font-size: 1rem;
            cursor: pointer;
            opacity: 0.8;
        }

        .close-chat:hover {
            opacity: 1;
        }

        .chat-messages {
            flex-grow: 1;
            padding: 1rem;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            background-color: var(--bg-main);
        }

        body.dark-mode .chat-messages {
            background-color: #111827;
        }

        .message {
            max-width: 85%;
            padding: 0.6rem 0.8rem;
            border-radius: var(--border-radius-sm);
            font-size: 0.85rem;
            line-height: 1.4;
        }

        .system-msg, .bot-msg {
            align-self: flex-start;
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            border-bottom-left-radius: 0;
        }

        .user-msg {
            align-self: flex-end;
            background-color: var(--primary);
            color: white;
            border-bottom-right-radius: 0;
        }

        .chat-input-area {
            padding: 0.75rem;
            display: flex;
            gap: 0.5rem;
            background-color: var(--bg-card);
            border-top: 1px solid var(--border-color);
        }

        #chat-input {
            flex-grow: 1;
            border: 1px solid var(--border-color);
            background-color: var(--bg-main);
            padding: 0.5rem 0.75rem;
            border-radius: var(--border-radius-sm);
            font-size: 0.85rem;
            color: var(--text-main);
            outline: none;
        }

        body.dark-mode #chat-input {
            background-color: #111827;
        }

        #chat-input:focus {
            border-color: var(--primary);
        }

        #send-btn {
            background-color: var(--primary);
            color: white;
            border: none;
            width: 34px;
            height: 34px;
            border-radius: var(--border-radius-sm);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition-smooth);
        }

        #send-btn:hover {
            background-color: var(--primary-dark);
        }

        /* ==========================================================================
           FOOTER
           ========================================================================== */
        .app-footer {
            text-align: center;
            padding: 2rem 1rem;
            border-top: 1px solid var(--border-color);
            background-color: var(--bg-card);
            margin-top: auto;
        }

        .app-footer p {
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .footer-sub {
            font-size: 0.75rem !important;
            opacity: 0.8;
            margin-top: 0.25rem;
        }

        /* ==========================================================================
           RESPONSIVE DESIGN
           ========================================================================== */
        @media (max-width: 600px) {
            .header-container {
                padding: 0.75rem 1rem;
            }
            
            .title-text h1 {
                font-size: 1.15rem;
            }
            
            .app-container {
                padding: 1rem;
                gap: 1rem;
            }
            
            #search-input {
                padding: 0.75rem 2.5rem;
            }
            
            .search-icon {
                left: 1rem;
            }
            
            .faq-question-btn {
                padding: 1rem;
            }
            
            .chat-window {
                width: 100vw;
                height: 100vh;
                bottom: 0;
                right: 0;
                border-radius: 0;
                position: fixed;
            }
        }
    </style>
</head>
<body class="light-mode">
    <!-- 背景裝飾 - 純扁平風格已移除 Blob 動畫 -->
    <div class="glow-bg"></div>

    <header class="app-header">
        <div class="header-container">
            <div class="logo-section">
                <i class="fa-solid fa-graduation-cap logo-icon"></i>
                <div class="title-text">
                    <h1>中正高中家長問答專區</h1>
                    <p>114 學年度學生手冊快速檢索系統</p>
                </div>
            </div>
            <div class="action-section">
                <button id="theme-toggle" class="theme-btn" aria-label="切換主題">
                    <i class="fa-solid fa-moon"></i>
                </button>
            </div>
        </div>
    </header>

    <main class="app-container">
        <!-- 搜尋與導航區 -->
        <section class="search-section">
            <div class="search-wrapper">
                <i class="fa-solid fa-magnifying-glass search-icon"></i>
                <input type="text" id="search-input" placeholder="輸入關鍵字搜尋... (例如：請假、手機、畢業學分、銷過)">
                <button id="clear-search" class="clear-btn" style="display: none;">
                    <i class="fa-solid fa-xmark"></i>

                    <strong>學校不可任意搜查學生物品，安全檢查必須符合嚴格程序：</strong>
                    <ol>
                        <li><strong>搜查前提：</strong> 僅限「特定身分學生有危害他人安全之虞」，或「涉嫌犯罪、攜帶違禁品（刀械、毒品、菸酒等）」，且須經校長、家長代表、導師等緊急會商確認有具體危險之虞。</li>
                        <li><strong>搜查程序：</strong> 現場必須有 <strong>2 位以上人員</strong>（教職員或學生代表）陪同在場。在不接觸學生身體的前提下，引導學生自行打開書包或抽屜。</li>
                        <li><strong>全程錄影：</strong> 搜查過程必須<strong>全程錄影</strong>，且錄影檔案至少保存 <strong>3 年</strong>，且所有相關人員均負有嚴格保密義務。</li>
                    </ol>
                `,
                ruleRef: "校園安全檢查規定參、一、二及肆、二、三"
            }
        ];

        /* ==========================================================================
           APP INITIALIZATION & CORE FUNCTIONALITY
           ========================================================================== */
        document.addEventListener("DOMContentLoaded", () => {
            const faqListContainer = document.getElementById("faq-list");
            const searchInput = document.getElementById("search-input");
            const clearSearchBtn = document.getElementById("clear-search");
            const resultCountSpan = document.getElementById("result-count");
            const noResultsDiv = document.getElementById("no-results");
            const themeToggleBtn = document.getElementById("theme-toggle");
            
            let currentCategory = "all";
            let searchQuery = "";

            // 渲染卡片
            function renderFAQ() {
                faqListContainer.innerHTML = "";
                
                // 篩選與搜尋
                const filteredData = faqData.filter(item => {
                    const matchesCategory = (currentCategory === "all" || item.category === currentCategory);
                    const matchesSearch = searchQuery === "" || 
                        item.question.toLowerCase().includes(searchQuery.toLowerCase()) ||
                        item.quickAnswer.toLowerCase().includes(searchQuery.toLowerCase()) ||
                        item.ruleRef.toLowerCase().includes(searchQuery.toLowerCase());
                    return matchesCategory && matchesSearch;
                });

                // 更新計數
                resultCountSpan.textContent = `共 ${filteredData.length} 個相關問答`;

                if (filteredData.length === 0) {
                    noResultsDiv.style.display = "block";
                    return;
                }
                noResultsDiv.style.display = "none";

                // 動態生成 HTML 內容
                filteredData.forEach(item => {
                    const card = document.createElement("div");
                    card.className = `faq-card ${item.category}`;
                    card.dataset.id = item.id;

                    // 如果有搜尋字詞，進行高亮標註
                    let displayedQuestion = item.question;
                    let displayedAnswer = item.quickAnswer;
                    
                    if (searchQuery !== "") {
                        const regex = new RegExp(`(${escapeRegExp(searchQuery)})`, "gi");
                        displayedQuestion = displayedQuestion.replace(regex, "<mark>$1</mark>");
                        displayedAnswer = displayedAnswer.replace(regex, "<mark>$1</mark>");
                    }

                    card.innerHTML = `
                        <button class="faq-question-btn">
                            <span>
                                <span class="faq-category-badge">${item.categoryName}</span>
                                ${displayedQuestion}
                            </span>
                            <i class="fa-solid fa-chevron-down faq-chevron"></i>
                        </button>
                        <div class="faq-answer-container">
                            <div class="faq-answer-content">
                                <div class="quick-answer">
                                    <div class="quick-answer-title">
                                        <i class="fa-solid fa-bolt"></i> 快速解答
                                    </div>
                                    <p>${displayedAnswer}</p>
                                </div>
                                <div class="detailed-rule">
                                    <span class="detailed-rule-title">
                                        <i class="fa-solid fa-gavel"></i> 手冊條文依據
                                    </span>
                                    <span>${item.ruleRef}</span>
                                </div>
                            </div>
                        </div>
                    `;

                    // 手風琴動畫綁定
                    const btn = card.querySelector(".faq-question-btn");
                    const container = card.querySelector(".faq-answer-container");
                    
                    btn.addEventListener("click", () => {
                        const isOpen = card.classList.contains("open");

                        if (isOpen) {
                            card.classList.remove("open");
                            container.style.maxHeight = null;
                        } else {
                            card.classList.add("open");
                            container.style.maxHeight = container.scrollHeight + "px";
                        }
                    });

                    faqListContainer.appendChild(card);
                });
            }

            // 輔助函式：逸出正則表達式特殊字元
            function escapeRegExp(string) {
                return string.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
            }

            /* ==========================================================================
               CATEGORY FILTER CLICK HANDLERS
               ========================================================================== */
            const categoryBtns = document.querySelectorAll(".category-btn");
            categoryBtns.forEach(btn => {
                btn.addEventListener("click", () => {
                    categoryBtns.forEach(b => b.classList.remove("active"));
                    btn.classList.add("active");
                    currentCategory = btn.dataset.category;
                    renderFAQ();
                });
            });

            /* ==========================================================================
               SEARCH INPUT HANDLERS
               ========================================================================== */
            searchInput.addEventListener("input", (e) => {
                searchQuery = e.target.value.trim();
                if (searchQuery !== "") {
                    clearSearchBtn.style.display = "block";
                } else {
                    clearSearchBtn.style.display = "none";
                }
                renderFAQ();
            });

            clearSearchBtn.addEventListener("click", () => {
                searchInput.value = "";
                searchQuery = "";
                clearSearchBtn.style.display = "none";
                renderFAQ();
                searchInput.focus();
            });

            // 熱門標籤按鈕點擊
            const hotTags = document.querySelectorAll(".hot-tag");
            hotTags.forEach(tag => {
                tag.addEventListener("click", () => {
                    const tagText = tag.textContent;
                    searchInput.value = tagText;
                    searchQuery = tagText;
                    clearSearchBtn.style.display = "block";
                    
                    // 全部分類重置
                    categoryBtns.forEach(b => b.classList.remove("active"));
                    categoryBtns[0].classList.add("active");
                    currentCategory = "all";
                    
                    renderFAQ();
                    
                    // 捲動至列表頂端
                    document.querySelector(".faq-section").scrollIntoView({ behavior: "smooth" });
                });
            });

            /* ==========================================================================
               THEME TOGGLE (LIGHT / DARK MODE)
               ========================================================================== */
            themeToggleBtn.addEventListener("click", () => {
                const body = document.body;
                if (body.classList.contains("light-mode")) {
                    body.classList.replace("light-mode", "dark-mode");
                    localStorage.setItem("theme", "dark-mode");
                } else {
                    body.classList.replace("dark-mode", "light-mode");
                    localStorage.setItem("theme", "light-mode");
                }
            });

            // 初始化儲存的主題
            const savedTheme = localStorage.getItem("theme");
            if (savedTheme === "dark-mode") {
                document.body.classList.replace("light-mode", "dark-mode");
            }

            /* ==========================================================================
               AI CHAT WIDGET LOGIC
               ========================================================================== */
            const chatToggle = document.getElementById("chat-toggle");
            const chatWindow = document.getElementById("chat-window");
            const closeChat = document.getElementById("close-chat");
            const chatMessages = document.getElementById("chat-messages");
            const chatInput = document.getElementById("chat-input");
            const sendBtn = document.getElementById("send-btn");
            const chatBadge = document.querySelector(".chat-badge");

            chatToggle.addEventListener("click", () => {
                chatWindow.classList.toggle("open");
                chatBadge.style.display = "none"; // 點開後消去提示點
                setTimeout(() => {
                    chatMessages.scrollTop = chatMessages.scrollHeight;
                }, 100);
            });

            closeChat.addEventListener("click", () => {
                chatWindow.classList.remove("open");
            });

            // 發送訊息
            function handleSendMessage() {
                const queryText = chatInput.value.trim();
                if (queryText === "") return;

                // 新增使用者訊息
                appendMessage("user", queryText);
                chatInput.value = "";

                // 模擬 AI 思考中...
                const typingDiv = document.createElement("div");
                typingDiv.className = "message bot-msg typing";
                typingDiv.innerHTML = `<i class="fa-solid fa-ellipsis fa-bounce"></i> 正在為家長搜尋條文...`;
                chatMessages.appendChild(typingDiv);
                chatMessages.scrollTop = chatMessages.scrollHeight;

                setTimeout(() => {
                    typingDiv.remove();
                    const reply = getAIResponse(queryText);
                    appendMessage("bot", reply);
                }, 1000);
            }

            sendBtn.addEventListener("click", handleSendMessage);
            chatInput.addEventListener("keypress", (e) => {
                if (e.key === "Enter") {
                    handleSendMessage();
                }
            });

            function appendMessage(sender, text) {
                const msgDiv = document.createElement("div");
                msgDiv.className = `message ${sender}-msg`;
                msgDiv.innerHTML = `<p>${text}</p>`;
                chatMessages.appendChild(msgDiv);
                chatMessages.scrollTop = chatMessages.scrollHeight;
            }

            // AI 客服知識檢索邏輯
            function getAIResponse(userText) {
                const text = userText.toLowerCase();
                
                // 1. 請假/病假
                if (text.includes("病假") || text.includes("請假") || text.includes("生病") || text.includes("事假") || text.includes("請病假")) {
                    return `家長您好！關於請假規定：<br>
                    • 當天早上 <strong>9:00 前</strong> 需先撥打請假專線 <strong>(02)2823-3431</strong> 報備。<br>
                    • 學生返校 <strong>5 天內</strong> 須送出假單。<br>
                    • 連續請病假 <strong>2 天以上</strong> 需附診斷證明，<strong>10 天以上</strong> 需公私立醫院診斷證明。事假須事前請妥！<br>
                    • 詳情可參閱問答區的「請假與缺曠」分類。`;
                }
                
                // 2. 手機/行動裝置
                if (text.includes("手機") || text.includes("行動裝置") || text.includes("平板") || text.includes("打電動") || text.includes("上課玩")) {
                    return `家長您好！中正高中對手機管理非常明確：<br>
                    • <strong>僅限下課時間與午餐時間</strong> 開機使用。<br>
                    • 早自習、上課、午休、打掃時間一律<strong>關機且不能放在課桌上</strong>。<br>
                    • 若違規使用，手機將會被<strong>暫時保管並通知家長領回</strong>，屢勸不改會依校規記過。`;
                }

                // 3. 畢業標準/畢業證書/學分
                if (text.includes("畢業") || text.includes("畢業證書") || text.includes("學分") || text.includes("幾分畢業") || text.includes("沒畢業")) {
                    return `家長您好！畢業證書取得條件如下：<br>
                    • 修業期滿（3年內），累計修滿 182 學分中<strong>至少 150 學分及格</strong>。<br>
                    • 普通班的部定必修及校訂必修，至少需要 <strong>102 學分及格</strong>，選修至少 <strong>40 學分及格</strong>。<br>
                    • 且三年內功過相抵後，<strong>未滿三大過</strong>。<br>
                    • 若只滿 120 學分則只發給「修業證明書」。`;
                }

                // 4. 成績及格/補考
                if (text.includes("及格") || text.includes("補考") || text.includes("幾分") || text.includes("重修") || text.includes("補考標準")) {
                    return `家長您好！成績及格與補考規則：<br>
                    • <strong>一般學生：</strong> 60分及格。學期成績 <strong>40~59分</strong> 者可以參加補考。<br>
                    • <strong>特殊身分學生：</strong> 一年級 40分、二年級 50分、三年級 60分及格。補考分數達 30分 即可補考。<br>
                    • 補考及格，該科成績以「及格分數」登錄。補考仍不及格則需要申請「重修」。`;
                }

                // 5. 銷過/警告/大過/愛校服務
                if (text.includes("銷過") || text.includes("記警告") || text.includes("記過") || text.includes("愛校") || text.includes("大過") || text.includes("警告")) {
                    return `家長您好！銷過相關規定如下：<br>
                    • 被處分的學生可至教官室領表並經家長、導師簽名後，進行「愛校服務」銷過。<br>
                    • <strong>折抵標準（每服務30分鐘算1次）：</strong><br>
                      - 警告1支：需愛校服務 <strong>10 次</strong> (5小時)<br>
                      - 小過1支：需愛校服務 <strong>30 次</strong> (15小時)<br>
                      - 大過1支：需愛校服務 <strong>60 次</strong> (30小時)<br>
                    • 記得在當學年 <strong>8 月 31 日前</strong> 完成銷過。`;
                }

                // 6. 午休/遲到/作息
                if (text.includes("午休") || text.includes("作息") || text.includes("遲到") || text.includes("上學時間") || text.includes("幾點到校")) {
                    return `家長您好！一日作息要點：<br>
                    • 學生最晚應於上午 <strong>08:10 前</strong> 抵達教室上課。<br>
                    • <strong>午休時間 (12:30~13:00)</strong> 必須在教室保持安靜。<strong>12:35 後</strong> 未到一律算遲到，並列入缺曠課紀錄。<br>
                    • 每日通常於下午 16:05 放學。`;
                }

                // 7. 安全檢查/搜書包
                if (text.includes("搜書包") || text.includes("檢查書包") || text.includes("搜查") || text.includes("安全檢查") || text.includes("隱私")) {
                    return `家長您好！學校不能隨意搜查學生物品：<br>
                    • 只有在涉嫌犯罪、帶違禁品（如刀械、毒品），且經多人會商確認有安全危害之虞時才能安檢。<br>
                    • 檢查時必須有 <strong>2 人以上陪同</strong>，且<strong>必須全程錄影</strong>、錄影檔存檔3年，保護孩子隱私。`;
                }

                // 預設回覆（未匹配）
                return `家長您好，我不太了解「${userText}」的具體問題。建議您嘗試點擊下方的熱門話題：<br>
                1. <a href="#" onclick="document.getElementById('chat-input').value='請假規定'; return false;">如何幫孩子請假？</a><br>
                2. <a href="#" onclick="document.getElementById('chat-input').value='手機規定'; return false;">手機使用時間？</a><br>
                3. <a href="#" onclick="document.getElementById('chat-input').value='畢業標準'; return false;">畢業及格學分是多少？</a><br>
                4. <a href="#" onclick="document.getElementById('chat-input').value='愛校服務銷過'; return false;">如何申請愛校銷過？</a>`;
            }

            // 初始渲染
            renderFAQ();
        });
    </script>
</body>
</html>
