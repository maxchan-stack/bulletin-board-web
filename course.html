<body class="transition-colors duration-300 pb-24 md:pb-6">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        // ══════════════════════════════════════════════════════════════════
        // 1. 安全健壯的 Lucide Icon 組件 (避免語法錯誤，支援完全載入)
        // ══════════════════════════════════════════════════════════════════
        const LucideIcon = React.memo(({ name, size = 20, className = "" }) => {
            const containerRef = useRef(null);

            useEffect(() => {
                if (containerRef.current && window.lucide && window.lucide.icons) {
                    // 將駝峰標法轉成 Lucide 的 kebab-case (如 BookOpen -> book-open)
                    const kebabName = name.replace(/([a-z0-9])([A-Z])/g, '$1-$2').toLowerCase();
                    const iconDef = window.lucide.icons[name] || window.lucide.icons[kebabName];
                    if (iconDef && window.lucide.createElement) {
                        try {
                            const elem = window.lucide.createElement(iconDef);
                            elem.setAttribute('width', size);
                            elem.setAttribute('height', size);
                            elem.setAttribute('stroke-width', '2');
                            if (className) elem.setAttribute('class', className);
                            containerRef.current.innerHTML = '';
                            containerRef.current.appendChild(elem);
                        } catch (e) {
                            console.warn("Icon render warning", e);
                        }
                    }
                }
            }, [name, size, className]);

            return <span ref={containerRef} className={`inline-flex items-center justify-center shrink-0 ${className}`} style={{ width: size, height: size }} />;
        });

        // ══════════════════════════════════════════════════════════════════
        // 2. IndexedDB 備援儲存庫 (大容量非同步儲存，防止清空快取)
        // ══════════════════════════════════════════════════════════════════
        const IDB_NAME = 'ClassTrackerDB';
        const IDB_VERSION = 1;

        const openDB = () => {
            return new Promise((resolve) => {
                if (!window.indexedDB) { resolve(null); return; }
                const req = indexedDB.open(IDB_NAME, IDB_VERSION);
                req.onupgradeneeded = (e) => {
                    const db = e.target.result;
                    if (!db.objectStoreNames.contains('store')) {
                        db.createObjectStore('store');
                    }
                };
                req.onsuccess = () => resolve(req.result);
                req.onerror = () => resolve(null);
            });
        };

        const saveToIDB = async (key, val) => {
            try {
                const db = await openDB();
                if (!db) return;
                const tx = db.transaction('store', 'readwrite');
                tx.objectStore('store').put(val, key);
            } catch (e) { console.warn('IDB Save Error', e); }
        };

        const loadFromIDB = async (key) => {
            try {
                const db = await openDB();
                if (!db) return null;
                return new Promise((res) => {
                    const tx = db.transaction('store', 'readonly');
                    const req = tx.objectStore('store').get(key);
                    req.onsuccess = () => res(req.result || null);
                    req.onerror = () => res(null);
                });
            } catch { return null; }
        };

        // ══════════════════════════════════════════════════════════════════
        // 3. UI 高級卡片與按鈕 (無印良品 MUJI 風格)
        // ══════════════════════════════════════════════════════════════════
        const MujiCard = React.memo(({ children, className = "" }) => (
            <div className={`bg-white rounded-2xl shadow-[0_2px_12px_rgba(20,40,38,0.06)] p-5 sm:p-7 border border-[#dde4e3] ${className}`}>
                {children}
            </div>
        ));

        const MujiButton = React.memo(({ onClick, iconName, label, variant = 'primary', className = "", disabled = false, size = "md", type = "button" }) => {
            const sizeClasses = size === 'sm' ? 'px-3.5 py-1.5 text-xs' : 'px-6 py-2.5 text-sm';
            const variants = {
                primary: "bg-[#1a5d57] text-[#FAF8F5] hover:bg-[#134843] shadow-sm",
                secondary: "bg-[#e7f0ef] text-[#1a5d57] hover:bg-[#d4e5e3]",
                ghost: "bg-transparent text-[#5b6c6a] hover:bg-[#e7f0ef]",
                danger: "bg-transparent text-red-600 border border-red-200 hover:bg-red-50",
                header: "bg-white/15 text-white hover:bg-white/25 border border-white/30 backdrop-blur-md"
            };
            return (
                <button
                    onClick={onClick}
                    type={type}
                    disabled={disabled}
                    className={`inline-flex items-center justify-center gap-2 font-medium tracking-wide transition-all rounded-lg active:scale-95 disabled:opacity-40 cursor-pointer ${sizeClasses} ${variants[variant]} ${className}`}
                >
                    {iconName && <LucideIcon name={iconName} size={size === 'sm' ? 16 : 18} />}
                    {label && <span>{label}</span>}
                </button>
            );
        });

        const MujiBadge = ({ label, value, urgent, total }) => {
            const percentage = total > 0 ? Math.min(100, Math.round((value / total) * 100)) : 0;
            return (
                <div className={`relative overflow-hidden flex flex-col items-center justify-center px-3 py-2.5 rounded-xl flex-1 min-w-[75px] transition-colors ${urgent ? 'bg-[#c8862a] text-white shadow-sm' : 'bg-[#e7f0ef]/60 text-[#243231]'}`}>
                    {!urgent && <div className="absolute bottom-0 left-0 h-1 bg-[#1a5d57]/30 transition-all" style={{ width: `${percentage}%` }}></div>}
                    <span className={`text-[10px] font-bold uppercase tracking-wider ${urgent ? 'opacity-90' : 'text-[#5b6c6a]'}`}>{label}</span>
                    <span className="text-xl font-bold mt-0.5 leading-none relative z-10">{value}</span>
                    <span className="text-[9px] opacity-70 font-semibold mt-0.5">堂</span>
                </div>
            );
        };

        // ══════════════════════════════════════════════════════════════════
        // 4. 主應用程式元件 (ClassTrackerV10)
        // ══════════════════════════════════════════════════════════════════
        function ClassTrackerV10() {
            const DEFAULT_YEARS = ['113-1', '113-2', '114-1', '114-2'];
            const DEFAULT_CURRENT_YEAR = '114-1';
            const INITIAL_HOLIDAYS = ['2025-01-27', '2025-01-28', '2025-01-29', '2025-01-30', '2025-01-31', '2025-02-28', '2025-04-03', '2025-04-04', '2025-05-30', '2025-10-10', '2026-01-01'];

            const formatDate = (d) => {
                const z = new Date(d.getTime() - d.getTimezoneOffset() * 60000);
                return z.toISOString().split('T')[0];
            };
            const getDayBefore = (s) => { if (!s) return null; const d = new Date(s); d.setDate(d.getDate() - 1); return formatDate(d); };
            const weekDays = ['一', '二', '三', '四', '五', '六', '日'];

            // --- State Declarations ---
            const [academicYears, setAcademicYears] = useState(DEFAULT_YEARS);
            const [currentYear, setCurrentYear] = useState(DEFAULT_CURRENT_YEAR);
            const [records, setRecords] = useState([]);
            const [classes, setClasses] = useState([]);
            const [exams, setExams] = useState({});
            const [holidays, setHolidays] = useState(INITIAL_HOLIDAYS);
            const [customHolidays, setCustomHolidays] = useState([]);
            const [makeupDays, setMakeupDays] = useState({});

            const [viewMode, setViewMode] = useState('list');
            
            const [showSettings, setShowSettings] = useState(false);
            const [settingTab, setSettingTab] = useState('class');
            const [filter, setFilter] = useState('');

            const [form, setForm] = useState({ className: '', subject: '', date: formatDate(new Date()), progress: '', homework: '', quiz: false, tags: [], note: '' });
            const [tags, setTags] = useState(['複習', '實驗', '影片', '學習單', '分組', '口試']);
            const [expandedClasses, setExpandedClasses] = useState({});
            const [calendarDate, setCalendarDate] = useState(new Date());

            // Cloud Offline Sync Queue
            const [cloudSettings, setCloudSettings] = useState({ gasUrl: '' });
            const [offlineQueue, setOfflineQueue] = useState([]);
            const [isOnline, setIsOnline] = useState(navigator.onLine);

            // Undo Delete & Edit
            const [deletedRecord, setDeletedRecord] = useState(null);
            const undoTimeoutRef = useRef(null);
            const [editingRecord, setEditingRecord] = useState(null);

            // 自訂 Universal Modal State
            const [modalConfig, setModalConfig] = useState(null);
            const [smartProgressModal, setSmartProgressModal] = useState(null);

            // D&D Sort Refs
            const dragItem = useRef(null);
            const dragOverItem = useRef(null);

            const [isInitialized, setIsInitialized] = useState(false);

            // --- Custom Modal Helper Functions ---
            const showAlert = (title, message) => {
                setModalConfig({ type: 'alert', title, message });
            };

            const showConfirm = (title, message, onConfirm) => {
                setModalConfig({ type: 'confirm', title, message, onConfirm });
            };

            const showPrompt = (title, placeholder, onSubmit) => {
                setModalConfig({ type: 'prompt', title, placeholder, value: '', onPromptSubmit: onSubmit });
            };

            // --- Initialization & PWA Service Worker ---
            useEffect(() => {
                if ('serviceWorker' in navigator) {
                    navigator.serviceWorker.register('./sw.js').catch(err => console.log('SW registration skipped', err));
                }

                const handleOnline = () => setIsOnline(true);
                const handleOffline = () => setIsOnline(false);
                window.addEventListener('online', handleOnline);
                window.addEventListener('offline', handleOffline);

                const loadData = async () => {
                    const load = (k, def) => { try { return JSON.parse(localStorage.getItem(k)) || def; } catch { return def; } };
                    
                    let idbRecords = await loadFromIDB('records');
                    setRecords((idbRecords && idbRecords.length > 0) ? idbRecords : load('v10_records', []));

                    let idbClasses = await loadFromIDB('classes');
                    setClasses((idbClasses && idbClasses.length > 0) ? idbClasses : load('v10_classes', INITIAL_CLASSES));

                    setAcademicYears(load('v10_years', DEFAULT_YEARS));
                    setCurrentYear(localStorage.getItem('v10_current_year') || DEFAULT_CURRENT_YEAR);
                    setExams(load('v10_exams', {}));
                    setHolidays(load('v10_holidays', INITIAL_HOLIDAYS));
                    setCustomHolidays(load('v10_custom_holidays', []));
                    setMakeupDays(load('v10_makeup_days', {}));
                    setTags(load('v10_tags', ['複習', '實驗', '影片', '學習單', '分組', '口試']));
                    setCloudSettings(load('v10_cloud_settings', { gasUrl: '' }));
                    setOfflineQueue(load('v10_offline_queue', []));

                    setIsInitialized(true);
                };

                loadData();

                // ══════════════════════════════════════════════════════════════════
                // 5. Firebase Realtime Database 免費即時推播與同步模組 (方案 B)
                // ══════════════════════════════════════════════════════════════════
                const defaultDbUrl = 'https://classtracker-v10-default-rtdb.firebaseio.com';
                const firebaseConfig = JSON.parse(localStorage.getItem('v10_firebase_settings') || `{"dbUrl":"${defaultDbUrl}"}`);
                const currentDbUrl = (firebaseConfig.dbUrl || defaultDbUrl).replace(/\/+$/, '');

                let eventSource = null;

                // 開頁與背景即時監聽 (EventSource Server-Sent Events)
                const startFirebaseListener = () => {
                    if (!currentDbUrl || !window.EventSource) return;
                    try {
                        // 關閉舊連線
                        if (eventSource) eventSource.close();

                        // 建立即時推播監聽
                        eventSource = new EventSource(`${currentDbUrl}/classtracker.json`);
                        
                        eventSource.onmessage = (e) => {
                            try {
                                const payload = JSON.parse(e.data);
                                if (!payload || !payload.data) return;
                                const data = payload.data;
                                
                                if (data.records) {
                                    const recordList = Array.isArray(data.records) 
                                        ? data.records.filter(Boolean) 
                                        : Object.values(data.records);
                                    
                                    setRecords(prev => {
                                        const localMap = new Map(prev.map(r => [r.id, r]));
                                        let updated = false;
                                        recordList.forEach(r => {
                                            if (r && r.id && (!localMap.has(r.id) || JSON.stringify(localMap.get(r.id)) !== JSON.stringify(r))) {
                                                localMap.set(r.id, r);
                                                updated = true;
                                            }
                                        });
                                        return updated 
                                            ? Array.from(localMap.values()).sort((a, b) => new Date(b.date || b.timestamp) - new Date(a.date || a.timestamp))
                                            : prev;
                                    });
                                }

                                if (data.classes) {
                                    const classList = Array.isArray(data.classes)
                                        ? data.classes.filter(Boolean)
                                        : Object.values(data.classes);

                                    setClasses(prev => {
                                        const localKeys = new Set(prev.map(c => c.name + '_' + c.year));
                                        const newClasses = classList.filter(c => c && !localKeys.has(c.name + '_' + c.year));
                                        return newClasses.length > 0 ? [...prev, ...newClasses] : prev;
                                    });
                                }
                            } catch (err) { console.warn('Firebase SSE parse error', err); }
                        };

                        eventSource.onerror = () => {
                            // 若連線中斷則手動回退至 REST 抓取
                            fetchFirebaseRest();
                        };
                    } catch (err) {
                        fetchFirebaseRest();
                    }
                };

                // REST 備用抓取
                const fetchFirebaseRest = async () => {
                    if (!currentDbUrl) return;
                    try {
                        const res = await fetch(`${currentDbUrl}/classtracker.json`);
                        if (!res.ok) return;
                        const data = await res.json();
                        if (data) {
                            if (data.records) {
                                const list = Array.isArray(data.records) ? data.records.filter(Boolean) : Object.values(data.records);
                                setRecords(prev => {
                                    const map = new Map(prev.map(r => [r.id, r]));
                                    list.forEach(r => { if (r && r.id) map.set(r.id, r); });
                                    return Array.from(map.values()).sort((a, b) => new Date(b.date || b.timestamp) - new Date(a.date || a.timestamp));
                                });
                            }
                            if (data.classes) {
                                const list = Array.isArray(data.classes) ? data.classes.filter(Boolean) : Object.values(data.classes);
                                setClasses(prev => {
                                    const keys = new Set(prev.map(c => c.name + '_' + c.year));
                                    const added = list.filter(c => c && !keys.has(c.name + '_' + c.year));
                                    return added.length > 0 ? [...prev, ...added] : prev;
                                });
                            }
                        }
                    } catch (e) { console.warn('Firebase REST fetch skipped', e); }
                };

                // 新增紀錄即時寫入 Firebase
                window.syncRecordToFirebase = async (record) => {
                    if (!currentDbUrl) return;
                    try {
                        await fetch(`${currentDbUrl}/classtracker/records/${record.id}.json`, {
                            method: 'PUT',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(record)
                        });
                    } catch (e) { console.warn('Firebase write skipped', e); }
                };

                window.syncClassesToFirebase = async (classesList) => {
                    if (!currentDbUrl) return;
                    try {
                        await fetch(`${currentDbUrl}/classtracker/classes.json`, {
                            method: 'PUT',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(classesList)
                        });
                    } catch (e) { console.warn('Firebase class write skipped', e); }
                };

                startFirebaseListener();

                // 自動聯網查詢並更新行政院國定放假日期 (TaiwanCalendar API)
                const autoFetchHolidays = async () => {
                    const y = new Date().getFullYear();
                    const yearsToFetch = [y - 1, y, y + 1];
                    try {
                        const results = await Promise.all(
                            yearsToFetch.map(async (year) => {
                                try {
                                    const res = await fetch(`https://cdn.jsdelivr.net/gh/ruyut/TaiwanCalendar/data/${year}.json`);
                                    if (!res.ok) return [];
                                    const data = await res.json();
                                    return data.filter(x => x.isHoliday).map(x => x.date.replace(/(\d{4})(\d{2})(\d{2})/, '$1-$2-$3'));
                                } catch { return []; }
                            })
                        );
                        const fetched = results.flat();
                        if (fetched.length > 0) {
                            setHolidays(prev => [...new Set([...prev, ...fetched])].sort());
                        }
                    } catch (e) { console.warn('Auto holiday sync skipped', e); }
                };
                autoFetchHolidays();

                return () => {
                    if (pollingTimer) clearInterval(pollingTimer);
                    window.removeEventListener('online', handleOnline);
                    window.removeEventListener('offline', handleOffline);
                };
            }, []);

            // Consolidated LocalStorage & IndexedDB Data Persistence
            const persistentData = useMemo(() => ({
                records, classes, exams, holidays, customHolidays, makeupDays,
                years: academicYears, tags, currentYear, cloudSettings, offlineQueue
            }), [records, classes, exams, holidays, customHolidays, makeupDays, academicYears, tags, currentYear, cloudSettings, offlineQueue]);

            useEffect(() => {
                if (!isInitialized) return;

                Object.entries(persistentData).forEach(([key, value]) => {
                    const storageKey = key === 'years' ? 'v10_years' :
                        key === 'currentYear' ? 'v10_current_year' :
                        key === 'cloudSettings' ? 'v10_cloud_settings' :
                        key === 'offlineQueue' ? 'v10_offline_queue' : `v10_${key}`;
                    
                    localStorage.setItem(storageKey, typeof value === 'string' ? value : JSON.stringify(value));
                });

                saveToIDB('records', records);
                saveToIDB('classes', classes);
            }, [persistentData, isInitialized]);

            

            // --- Offline Cloud Queue Processing ---
            useEffect(() => {
                if (isOnline && offlineQueue.length > 0 && cloudSettings.gasUrl) {
                    const processQueue = async () => {
                        const queueToProcess = [...offlineQueue];
                        setOfflineQueue([]);
                        for (const item of queueToProcess) {
                            try {
                                await fetch(cloudSettings.gasUrl, {
                                    method: 'POST',
                                    mode: 'no-cors',
                                    headers: { 'Content-Type': 'application/json' },
                                    body: JSON.stringify({ action: 'add_record', record: item })
                                });
                            } catch (e) {
                                console.warn('Cloud sync queue retry failed', e);
                            }
                        }
                    };
                    processQueue();
                }
            }, [isOnline, offlineQueue, cloudSettings]);

            const uploadRecordToCloud = async (record) => {
                if (!cloudSettings.gasUrl) return;
                if (!navigator.onLine) {
                    setOfflineQueue(prev => [...prev, record]);
                    return;
                }
                try {
                    await fetch(cloudSettings.gasUrl, {
                        method: 'POST',
                        mode: 'no-cors',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ action: 'add_record', record })
                    });
                } catch (e) {
                    setOfflineQueue(prev => [...prev, record]);
                }
            };

            const currentExams = useMemo(() => exams[currentYear] || {
                semesterStart: '', semesterEnd: '',
                exam1: { start: '', end: '' }, exam2: { start: '', end: '' }, exam3: { start: '', end: '' }
            }, [exams, currentYear]);

            const currentYearClasses = useMemo(() => classes.filter(c => c.year === currentYear), [classes, currentYear]);
            const currentYearRecords = useMemo(() => records.filter(r => r.year === currentYear), [records, currentYear]);

            const isClassDoneToday = (className) => {
                const today = formatDate(new Date());
                return currentYearRecords.some(r => r.className === className && r.date === today);
            };

            // ══════════════════════════════════════════════════════════════════
            // 5. 倒數演算法 (包含國定假日、彈性假期與補課日)
            // ══════════════════════════════════════════════════════════════════
            const calculateSessions = (sStr, eStr, days) => {
                if (!sStr || !eStr || !days?.length) return 0;
                const start = new Date(sStr);
                const end = new Date(eStr);
                if (start > end) return 0;

                const totalDays = Math.floor((end - start) / (1000 * 60 * 60 * 24)) + 1;
                const startDay = start.getDay();

                let count = days.reduce((acc, day) => {
                    const offset = (day - startDay + 7) % 7;
                    const fullWeeks = Math.floor((totalDays - offset - 1) / 7) + (offset < totalDays ? 1 : 0);
                    return acc + (fullWeeks < 0 ? 0 : fullWeeks);
                }, 0);

                const allHolidays = [...holidays, ...customHolidays];
                const holidayCount = allHolidays.filter(h => {
                    const hDate = new Date(h);
                    return hDate >= start && hDate <= end && days.includes(hDate.getDay());
                }).length;

                let makeupAdditions = 0;
                Object.entries(makeupDays).forEach(([mkDateStr, targetDayOfWeek]) => {
                    const mkDate = new Date(mkDateStr);
                    if (mkDate >= start && mkDate <= end && days.includes(parseInt(targetDayOfWeek))) {
                        if (!days.includes(mkDate.getDay())) {
                            makeupAdditions += 1;
                        }
                    }
                });

                return Math.max(0, count - holidayCount + makeupAdditions);
            };

            const currentClassStats = useMemo(() => {
                if (!form.className) return null;
                const target = currentYearClasses.find(c => c.name === form.className);
                if (!target?.days?.length) return null;

                let startDate = new Date();
                if (isClassDoneToday(form.className)) startDate.setDate(startDate.getDate() + 1);
                let startStr = formatDate(startDate);

                if (currentExams.semesterStart && startStr < currentExams.semesterStart) {
                    startStr = currentExams.semesterStart;
                }

                const getEnd = (ex) => ex.start ? getDayBefore(ex.start) : null;
                const weekly = target.days.length;
                return {
                    exam1: currentExams.exam1.start ? calculateSessions(startStr, getEnd(currentExams.exam1), target.days) : 0,
                    exam1Total: weekly * 6,
                    exam2: currentExams.exam2.start ? calculateSessions(startStr, getEnd(currentExams.exam2), target.days) : 0,
                    exam2Total: weekly * 6,
                    exam3: currentExams.exam3.start ? calculateSessions(startStr, getEnd(currentExams.exam3), target.days) : 0,
                    exam3Total: weekly * 8
                };
            }, [form.className, currentYearClasses, exams, holidays, customHolidays, makeupDays, currentYearRecords, currentExams]);

            const todayClasses = useMemo(() => {
                const day = new Date().getDay();
                const todayStr = formatDate(new Date());
                if (holidays.includes(todayStr) || customHolidays.includes(todayStr)) return [];
                const doneClasses = currentYearRecords.filter(r => r.date === todayStr).map(r => r.className);
                return currentYearClasses
                    .filter(c => c.days && c.days.includes(day))
                    .map(c => ({ ...c, isDone: doneClasses.includes(c.name) }));
            }, [currentYearClasses, currentYearRecords, holidays, customHolidays]);

            const getRemainingForClass = (clsName) => {
                const target = classes.find(c => c.name === clsName);
                if (!target?.days?.length) return null;

                let startDate = new Date();
                if (isClassDoneToday(clsName)) startDate.setDate(startDate.getDate() + 1);
                let startStr = formatDate(startDate);

                if (currentExams.semesterStart && startStr < currentExams.semesterStart) {
                    startStr = currentExams.semesterStart;
                }

                let nextExam = null;
                if (currentExams.exam1.start && startStr < currentExams.exam1.start) nextExam = currentExams.exam1;
                else if (currentExams.exam2.start && startStr < currentExams.exam2.start) nextExam = currentExams.exam2;
                else if (currentExams.exam3.start && startStr < currentExams.exam3.start) nextExam = currentExams.exam3;

                if (nextExam) return calculateSessions(startStr, getDayBefore(nextExam.start), target.days);
                if (currentExams.semesterEnd && startStr <= currentExams.semesterEnd) {
                    return calculateSessions(startStr, currentExams.semesterEnd, target.days);
                }
                return null;
            };

            const handleSubmit = (e) => {
                e.preventDefault();
                if (!form.className || !form.subject || !form.progress) return;
                const newRecord = { id: Date.now(), ...form, year: currentYear, timestamp: new Date().toISOString() };
                setRecords([newRecord, ...records]);
                uploadRecordToCloud(newRecord);
                if (window.syncRecordToFirebase) window.syncRecordToFirebase(newRecord);
                setForm({ ...form, progress: '', homework: '', quiz: false, tags: [], note: '' });
                setExpandedClasses(p => ({ ...p, [form.className]: true }));
            };

            const handleDeleteRecord = (id) => {
                const record = records.find(r => r.id === id);
                if (!record) return;

                const remaining = records.filter(r => r.className === record.className && r.year === record.year && r.id !== id);
                let classToDelete = null;

                if (remaining.length === 0) {
                    classToDelete = classes.find(c => c.name === record.className && c.year === record.year);
                    if (classToDelete) setClasses(prev => prev.filter(c => c !== classToDelete));
                }

                setRecords(prev => prev.filter(r => r.id !== id));
                setDeletedRecord({ ...record, _restoredClass: classToDelete });

                if (undoTimeoutRef.current) clearTimeout(undoTimeoutRef.current);
                undoTimeoutRef.current = setTimeout(() => setDeletedRecord(null), 5000);
            };

            const handleUndoDelete = () => {
                if (deletedRecord) {
                    if (deletedRecord._restoredClass) {
                        setClasses(prev => {
                            const cls = deletedRecord._restoredClass;
                            if (prev.some(c => c.name === cls.name && c.year === cls.year)) return prev;
                            return [...prev, cls];
                        });
                    }
                    const { _restoredClass, ...originalRecord } = deletedRecord;
                    setRecords(prev => [...prev, originalRecord].sort((a, b) => b.id - a.id));
                    setDeletedRecord(null);
                    if (undoTimeoutRef.current) clearTimeout(undoTimeoutRef.current);
                }
            };

            const validateSchema = (data) => {
                if (typeof data !== 'object' || data === null) return false;
                if (data.records && !Array.isArray(data.records)) return false;
                if (data.classes && !Array.isArray(data.classes)) return false;
                return true;
            };

            const handleRestoreData = (parsedData) => {
                if (!validateSchema(parsedData)) {
                    showAlert('格式錯誤', '備份檔內容不符合規範，還原取消。');
                    return;
                }
                showConfirm('備份還原確認', '確定要還原備份資料？現有紀錄將被覆蓋（還原前系統已自動建立救回備份）。', () => {
                    localStorage.setItem('v10_safety_snapshot', JSON.stringify({ records, classes, exams, holidays }));
                    if (parsedData.records) setRecords(parsedData.records);
                    if (parsedData.classes) setClasses(parsedData.classes);
                    if (parsedData.exams) setExams(parsedData.exams);
                    if (parsedData.holidays) setHolidays(parsedData.holidays);
                    showAlert('還原成功', '備份資料已順利導入！');
                    setShowSettings(false);
                });
            };

            const handleFileRestore = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const r = new FileReader();
                r.onload = (ev) => {
                    try {
                        const parsed = JSON.parse(ev.target.result);
                        handleRestoreData(parsed);
                    } catch { showAlert('解析失敗', '請確認選擇的是正確的 JSON 備份檔。'); }
                };
                r.readAsText(file);
                e.target.value = '';
            };

            const handleExport = () => {
                let csvContent = "data:text/csv;charset=utf-8,\uFEFF日期,班級,科目,進度,作業,標籤\n";
                const sortedRecords = [...currentYearRecords].sort((a, b) => new Date(b.date) - new Date(a.date));
                sortedRecords.forEach(r => {
                    const cleanTags = [r.quiz ? '小考' : '', ...(r.tags || [])].filter(Boolean).join(';');
                    const row = [r.date, r.className, r.subject, `"${r.progress.replace(/"/g, '""')}"`, `"${(r.homework || '').replace(/"/g, '""')}"`, cleanTags];
                    csvContent += row.join(",") + "\n";
                });
                const link = document.createElement("a");
                link.setAttribute("href", encodeURI(csvContent));
                link.setAttribute("download", `教學進度報表_${currentYear}_${formatDate(new Date())}.csv`);
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            };

            const handleExportToClipboard = () => {
                const sortedRecords = [...currentYearRecords].sort((a, b) => new Date(b.date) - new Date(a.date));
                const text = sortedRecords.map(r => `${r.date} | ${r.className} | ${r.subject}\n進度: ${r.progress}\n${r.homework ? '作業: ' + r.homework : ''}\n`).join('\n-------------------\n');
                navigator.clipboard.writeText(text).then(() => showAlert('已複製', '報表內文已成功複製至剪貼簿！'), () => showAlert('錯誤', '複製失敗'));
            };

            const handleSort = () => {
                let _classes = [...classes];
                const currentList = _classes.filter(c => c.year === currentYear);
                const otherList = _classes.filter(c => c.year !== currentYear);
                const draggedItemContent = currentList.splice(dragItem.current, 1)[0];
                currentList.splice(dragOverItem.current, 0, draggedItemContent);
                dragItem.current = null;
                dragOverItem.current = null;
                setClasses([...otherList, ...currentList]);
            };

            const getCalendarDays = () => {
                const year = calendarDate.getFullYear();
                const month = calendarDate.getMonth();
                const firstDay = new Date(year, month, 1);
                const lastDay = new Date(year, month + 1, 0);
                const days = [];
                const startPad = firstDay.getDay() === 0 ? 6 : firstDay.getDay() - 1;
                for (let i = 0; i < startPad; i++) days.push({ date: null });

                for (let i = 1; i <= lastDay.getDate(); i++) {
                    const dateStr = formatDate(new Date(year, month, i));
                    const dayOfWeek = new Date(year, month, i).getDay();
                    const dayRecords = currentYearRecords.filter(r => r.date === dateStr);
                    const isHoliday = holidays.includes(dateStr);
                    const isCustomHoliday = customHolidays.includes(dateStr);
                    const isMakeup = dateStr in makeupDays;
                    const ghostClasses = [];

                    if (!isHoliday && !isCustomHoliday) {
                        currentYearClasses.forEach(cls => {
                            if (cls.days && cls.days.includes(dayOfWeek) && !dayRecords.find(r => r.className === cls.name)) {
                                ghostClasses.push(cls);
                            }
                        });
                    }
                    days.push({ date: dateStr, dayNum: i, records: dayRecords, isHoliday, isCustomHoliday, isMakeup, ghostClasses });
                }
                return days;
            };

            const toggleTag = (tag) => {
                const newTags = form.tags.includes(tag) ? form.tags.filter(t => t !== tag) : [...form.tags, tag];
                setForm({ ...form, tags: newTags });
            };

            // ══════════════════════════════════════════════════════════════════
            // 6. JSX UI 渲染 (MUJI 無印良品自然質感風)
            // ══════════════════════════════════════════════════════════════════
            return (
                <div className="min-h-screen">
                    {/* 毛玻璃頂部 Sticky Header */}
                    <header className="sticky top-0 z-40 bg-[#1a5d57]/95 backdrop-blur-md border-b border-[#134843] shadow-sm transition-all">
                        <div className="max-w-7xl mx-auto px-4 h-16 sm:h-20 flex items-center justify-between">
                            <div className="flex items-center gap-3">
                                <div className="bg-[#FAF8F5] text-[#1a5d57] p-2.5 rounded-xl shadow-sm"><LucideIcon name="BookOpen" size={24} /></div>
                                <div>
                                    <h1 className="text-xl sm:text-2xl font-bold font-title text-[#FAF8F5] tracking-wide leading-none">教學日誌</h1>
                                    <div className="flex items-center gap-2 mt-1">
                                        <span className="text-[10px] font-semibold text-emerald-200 tracking-wider">V10 ULTRA</span>
                                        {!isOnline && <span className="bg-amber-600/80 text-white text-[9px] px-1.5 py-0.5 rounded font-bold">離線模式</span>}
                                        {offlineQueue.length > 0 && <span className="bg-blue-600/80 text-white text-[9px] px-1.5 py-0.5 rounded font-bold">待同步 ({offlineQueue.length})</span>}
                                    </div>
                                </div>
                            </div>
                            <div className="flex items-center gap-2">
                                <div className="hidden md:flex items-center bg-black/15 rounded-full px-3 py-1.5 gap-1">
                                    <select value={currentYear} onChange={e => setCurrentYear(e.target.value)} className="bg-transparent text-white font-medium text-sm outline-none cursor-pointer [&>option]:text-black">
                                        {academicYears.map(y => <option key={y} value={y}>{y} 學年</option>)}
                                    </select>
                                    <button
                                        onClick={() => {
                                            showPrompt('新增學年/學期', '輸入學年名稱 (例: 115-1)', (val) => {
                                                if (val && !academicYears.includes(val)) {
                                                    const updated = [...academicYears, val].sort();
                                                    setAcademicYears(updated);
                                                    setCurrentYear(val);
                                                    showAlert('新增成功', `已成功建立並切換至「${val}」學年！`);
                                                }
                                            });
                                        }}
                                        className="text-white/80 hover:text-white hover:bg-white/20 p-1 rounded-full text-xs font-bold transition-all"
                                        title="新增學年"
                                    >
                                        <LucideIcon name="Plus" size={14} />
                                    </button>
                                </div>
                                
                                <div className="hidden md:block w-px h-6 bg-white/20"></div>
                                <div className="hidden md:flex gap-1.5">
                                    <MujiButton onClick={() => setViewMode('list')} iconName="List" label="列表" variant={viewMode === 'list' ? 'header' : 'ghost'} className={viewMode === 'list' ? 'bg-white/25 text-white' : 'text-white/70 hover:text-white'} size="sm" />
                                    <MujiButton onClick={() => setViewMode('calendar')} iconName="Calendar" label="月曆" variant={viewMode === 'calendar' ? 'header' : 'ghost'} className={viewMode === 'calendar' ? 'bg-white/25 text-white' : 'text-white/70 hover:text-white'} size="sm" />
                                </div>
                                <MujiButton onClick={() => setShowSettings(true)} iconName="Settings" variant="header" size="sm" className="hidden md:flex" />
                            </div>
                        </div>
                    </header>

                    {/* 行動裝置底部導覽 */}
                    <div className="md:hidden fixed bottom-0 left-0 right-0 z-50 bg-white/90 backdrop-blur-md border-t border-[#dde4e3] pb-safe">
                        <div className="grid grid-cols-4 h-14">
                            <button onClick={() => setViewMode('list')} className={`flex flex-col items-center justify-center gap-0.5 ${viewMode === 'list' && !showSettings ? 'text-[#1a5d57] font-bold' : 'text-gray-400'}`}>
                                <LucideIcon name="List" size={20} /><span className="text-[10px]">列表</span>
                            </button>
                            <button onClick={() => setViewMode('calendar')} className={`flex flex-col items-center justify-center gap-0.5 ${viewMode === 'calendar' && !showSettings ? 'text-[#1a5d57] font-bold' : 'text-gray-400'}`}>
                                <LucideIcon name="Calendar" size={20} /><span className="text-[10px]">月曆</span>
                            </button>
                            <div className="relative -top-4 flex justify-center">
                                <button onClick={() => { setShowSettings(false); setViewMode('list'); window.scrollTo({ top: 0, behavior: 'smooth' }); }} className="w-12 h-12 bg-[#1a5d57] rounded-full shadow-md text-white flex items-center justify-center micro-interaction">
                                    <LucideIcon name="Plus" size={24} />
                                </button>
                            </div>
                            <button onClick={() => setShowSettings(true)} className={`flex flex-col items-center justify-center gap-0.5 ${showSettings ? 'text-[#1a5d57] font-bold' : 'text-gray-400'}`}>
                                <LucideIcon name="Settings" size={20} /><span className="text-[10px]">設定</span>
                            </button>
                        </div>
                    </div>

                    <main className="max-w-7xl mx-auto p-4 sm:p-6 grid grid-cols-1 lg:grid-cols-12 gap-6 items-start mt-2">
                        {/* 今日課表 Dashboard */}
                        <div className="lg:col-span-12 mb-2 animate-pop">
                            <div className="kicker">TODAY DASHBOARD</div>
                            <div className="flex items-center justify-between mb-3">
                                <h2 className="text-xl font-bold font-title text-[#243231] flex items-center gap-2">
                                    <LucideIcon name="Clock" className="text-[#1a5d57]" /> 今日課表概況
                                </h2>
                            </div>
                            {todayClasses.length > 0 ? (
                                <div className="flex gap-3 overflow-x-auto pb-2 no-scrollbar snap-x">
                                    {todayClasses.map(c => (
                                        <div
                                            key={c.name}
                                            onClick={() => setForm(f => ({ ...f, className: c.name }))}
                                            className={`snap-start shrink-0 w-36 p-3.5 rounded-xl border cursor-pointer transition-all micro-interaction ${form.className === c.name ? 'bg-[#1a5d57] border-[#1a5d57] text-white shadow-md' : c.isDone ? 'bg-[#e7f0ef]/50 border-transparent text-gray-400' : 'bg-white border-[#dde4e3] text-[#243231]'}`}
                                        >
                                            <div className="flex justify-between items-start mb-1">
                                                <span className={`text-[10px] font-bold px-1.5 py-0.5 rounded ${form.className === c.name ? 'bg-white/20 text-white' : 'bg-gray-100 text-gray-500'}`}>週{weekDays[new Date().getDay() - 1]}</span>
                                                {c.isDone && <LucideIcon name="Check" size={14} className={form.className === c.name ? 'text-white' : 'text-[#2e7d32]'} />}
                                            </div>
                                            <div className="text-lg font-bold font-title">{c.name}</div>
                                        </div>
                                    ))}
                                </div>
                            ) : (
                                <div className="bg-white/60 rounded-xl p-4 text-center text-gray-400 font-medium border border-dashed border-[#dde4e3] text-sm">
                                    ☕ 今日無安排課程，好好放鬆休息吧！
                                </div>
                            )}
                        </div>

                        {/* 左側：新增與編輯表單 */}
                        <div className={`lg:col-span-5 space-y-6 lg:sticky lg:top-24 ${viewMode === 'calendar' ? 'hidden lg:block' : ''}`}>
                            <MujiCard className="border-t-4 border-t-[#1a5d57]">
                                <div className="kicker">QUICK RECORD</div>
                                <h2 className="text-xl font-bold font-title text-[#243231] mb-5 flex items-center gap-2">
                                    <LucideIcon name="Plus" size={22} className="text-[#1a5d57]" /> 新增教學進度
                                </h2>
                                <form onSubmit={handleSubmit} className="space-y-4">
                                    <div className="relative">
                                        <select
                                            name="className"
                                            value={form.className}
                                            onChange={e => setForm({ ...form, className: e.target.value })}
                                            required
                                            className="w-full bg-[#f4f6f7] text-[#243231] font-bold text-lg p-3 rounded-xl border border-[#dde4e3] outline-none focus:border-[#1a5d57] appearance-none"
                                        >
                                            <option value="" disabled>選擇班級...</option>
                                            {currentYearClasses.map(c => <option key={c.name} value={c.name}>{c.name}</option>)}
                                        </select>
                                        <div className="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 pointer-events-none"><LucideIcon name="ChevronDown" /></div>
                                    </div>

                                    {/* 剩餘堂數計數器卡片 */}
                                    {currentClassStats && (currentExams.exam1.start || currentExams.exam2.start || currentExams.exam3.start) ? (
                                        <div className="bg-[#f4f6f7] rounded-xl p-2 border border-[#dde4e3] flex gap-2">
                                            <MujiBadge label="一段前" value={currentClassStats.exam1} total={currentClassStats.exam1Total} urgent={currentClassStats.exam1 > 0 && currentClassStats.exam1 < 5} />
                                            <MujiBadge label="二段前" value={currentClassStats.exam2} total={currentClassStats.exam2Total} />
                                            <MujiBadge label="期末前" value={currentClassStats.exam3} total={currentClassStats.exam3Total} />
                                        </div>
                                    ) : (
                                        <div onClick={() => { setShowSettings(true); setSettingTab('exam') }} className="bg-amber-50 p-3 rounded-xl text-center text-[#c8862a] font-medium text-xs cursor-pointer border border-dashed border-amber-200">
                                            ⚠ 點此前往設定段考日期以開啟堂數倒數
                                        </div>
                                    )}

                                    <div className="grid grid-cols-2 gap-3">
                                        <input
                                            type="text"
                                            placeholder="科目 (例: 物理)"
                                            value={form.subject}
                                            onChange={e => setForm({ ...form, subject: e.target.value })}
                                            required
                                            className="bg-[#f4f6f7] p-3 rounded-xl border border-[#dde4e3] text-sm font-medium outline-none focus:border-[#1a5d57]"
                                        />
                                        <input
                                            type="date"
                                            value={form.date}
                                            onChange={e => setForm({ ...form, date: e.target.value })}
                                            required
                                            className="bg-[#f4f6f7] p-3 rounded-xl border border-[#dde4e3] text-sm font-medium outline-none focus:border-[#1a5d57]"
                                        />
                                    </div>

                                    {/* 多筆智慧進度挑選器 */}
                                    {(() => {
                                        if (!form.subject) return null;
                                        const suggestions = currentYearRecords
                                            .filter(r => r.subject === form.subject && r.className !== form.className)
                                            .sort((a, b) => new Date(b.date) - new Date(a.date));

                                        if (suggestions.length > 0) {
                                            const latest = suggestions[0];
                                            return (
                                                <div
                                                    onClick={() => {
                                                        if (suggestions.length === 1) {
                                                            setForm(f => ({ ...f, progress: latest.progress, homework: latest.homework }));
                                                        } else {
                                                            setSmartProgressModal(suggestions.slice(0, 5));
                                                        }
                                                    }}
                                                    className="cursor-pointer bg-[#e7f0ef] p-3 rounded-xl border border-[#1a5d57]/20 flex items-center gap-3 hover:bg-[#d4e5e3] transition-colors"
                                                >
                                                    <div className="bg-[#1a5d57] text-white rounded-full p-1"><LucideIcon name="Sparkles" size={14} /></div>
                                                    <div className="flex-1 overflow-hidden">
                                                        <div className="text-[11px] font-bold text-[#1a5d57]">帶入同科目其他班進度 ({suggestions.length} 筆可選)</div>
                                                        <div className="text-xs font-semibold text-[#243231] truncate">{latest.className} ({latest.date}): {latest.progress}</div>
                                                    </div>
                                                </div>
                                            );
                                        }
                                    })()}

                                    <textarea
                                        value={form.progress}
                                        onChange={e => setForm({ ...form, progress: e.target.value })}
                                        required

                    {modalConfig && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/50 backdrop-blur-sm animate-pop">
                            <div className="bg-white w-full max-w-sm rounded-2xl p-6 shadow-xl space-y-4">
                                <h4 className="text-lg font-bold font-title text-[#243231]">{modalConfig.title}</h4>
                                {modalConfig.message && <p className="text-xs text-gray-600 leading-relaxed whitespace-pre-line">{modalConfig.message}</p>}
                                {modalConfig.type === 'prompt' && (
                                    <input
                                        type="text"
                                        placeholder={modalConfig.placeholder}
                                        value={modalConfig.value}
                                        onChange={e => setModalConfig({ ...modalConfig, value: e.target.value })}
                                        className="w-full bg-[#f4f6f7] p-2.5 rounded-xl border border-[#dde4e3] text-xs font-medium outline-none"
                                    />
                                )}
                                <div className="flex justify-end gap-2 pt-2">
                                    {modalConfig.type !== 'alert' && (
                                        <MujiButton onClick={() => setModalConfig(null)} label="取消" variant="ghost" size="sm" />
                                    )}
                                    <MujiButton
                                        onClick={() => {
                                            if (modalConfig.type === 'confirm' && modalConfig.onConfirm) modalConfig.onConfirm();
                                            if (modalConfig.type === 'prompt' && modalConfig.onPromptSubmit) modalConfig.onPromptSubmit(modalConfig.value);
                                            setModalConfig(null);
                                        }}
                                        label="確定"
                                        size="sm"
                                    />
                                </div>
                            </div>
                        </div>
                    )}

                    {/* 多筆智慧進度選單 Modal */}
                    {smartProgressModal && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/50 backdrop-blur-sm animate-pop">
                            <div className="bg-white w-full max-w-md rounded-2xl p-6 shadow-xl space-y-4">
                                <div className="flex justify-between items-center">
                                    <h4 className="text-base font-bold font-title text-[#1a5d57]">選擇要帶入的同科目進度</h4>
                                    <button onClick={() => setSmartProgressModal(null)} className="text-gray-400"><LucideIcon name="X" /></button>
                                </div>
                                <div className="space-y-2 max-h-60 overflow-y-auto no-scrollbar">
                                    {smartProgressModal.map(item => (
                                        <div
                                            key={item.id}
                                            onClick={() => {
                                                setForm(f => ({ ...f, progress: item.progress, homework: item.homework }));
                                                setSmartProgressModal(null);
                                            }}
                                            className="p-3 bg-[#f4f6f7] rounded-xl border border-[#dde4e3] hover:border-[#1a5d57] cursor-pointer text-xs space-y-1 transition-all"
                                        >
                                            <div className="flex justify-between font-bold text-[#1a5d57]">
                                                <span>{item.className}</span>
                                                <span className="text-gray-400">{item.date}</span>
                                            </div>
                                            <div className="text-gray-800 font-medium">{item.progress}</div>
                                            {item.homework && <div className="text-gray-500 text-[11px]">作業: {item.homework}</div>}
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ClassTrackerV10 />);
    </script>
</body>

</html>
