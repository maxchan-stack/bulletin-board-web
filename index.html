<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>高二甲班 班級資訊整合入口</title>
  <meta name="description" content="高二甲班專屬資訊平台，整合班級電子布告欄、學生成績查詢系統及班費收支查詢系統。">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --c-bg:           #f4f6f7;
      --c-surface:      #ffffff;
      --c-border:       #dde4e3;
      --c-text:         #243231;
      --c-text-muted:   #5b6c6a;
      --c-primary:      #1a5d57;
      --c-primary-dark: #134843;
      --c-primary-dim:  rgba(26,93,87,0.06);
      --c-shadow:       rgba(36,50,49,0.08);
      
      --c-bulletin:     #1a5d57;
      --c-grades:       #4c729f;
      --c-ledger:       #c8862a;

      --transition:     all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
      --radius-lg:      16px;
      --radius-md:      12px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--c-bg);
      color: var(--c-text);
      font-family: 'Outfit', 'Noto Sans TC', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      padding: 40px 20px;
      -webkit-font-smoothing: antialiased;
      position: relative;
      width: 100%;
      overflow-x: hidden; /* 防止背景光暈導致橫向捲動軸 */
    }

    /* ── 背景光暈裝飾 ── */
    .bg-glow {
      position: absolute;
      width: 400px;
      height: 400px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(26,93,87,0.08) 0%, rgba(255,255,255,0) 70%);
      top: -100px;
      left: -100px;
      z-index: -1;
      pointer-events: none;
    }
    .bg-glow-right {
      position: absolute;
      width: 500px;
      height: 500px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(76,114,159,0.06) 0%, rgba(255,255,255,0) 70%);
      bottom: -150px;
      right: -150px;
      z-index: -1;
      pointer-events: none;
    }

    /* ── 容器 ── */
    .container {
      width: 100%;
      max-width: 1080px;
      margin: auto;
      text-align: center;
    }

    /* ── 標頭區 ── */
    header {
      margin-bottom: 48px;
    }

    .class-badge {
      display: inline-block;
      background: var(--c-primary-dim);
      color: var(--c-primary);
      font-size: 0.85rem;
      font-weight: 600;
      padding: 6px 16px;
      border-radius: 30px;
      border: 1.5px solid rgba(26,93,87,0.15);
      margin-bottom: 16px;
      letter-spacing: 0.08em;
    }

    h1 {
      font-size: 2.2rem;
      font-weight: 700;
      color: var(--c-text);
      margin-bottom: 12px;
      letter-spacing: 0.02em;
    }

    .subtitle {
      color: var(--c-text-muted);
      font-size: 1.05rem;
      font-weight: 300;
      max-width: 600px;
      margin: 0 auto;
      line-height: 1.6;
    }

    /* ── 卡片網格 ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 28px;
      margin-bottom: 48px;
      perspective: 1000px;
    }

    /* ── 精美卡片設計 ── */
    .card {
      background: var(--c-surface);
      border: 1.5px solid var(--c-border);
      border-radius: var(--radius-lg);
      padding: 36px 24px 28px 24px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      align-items: center;
      text-decoration: none;
      color: inherit;
      box-shadow: 0 8px 24px var(--c-shadow);
      transition: var(--transition);
      position: relative;
      overflow: hidden;
      cursor: pointer;
    }

    /* 卡片懸停動畫與邊框發光 */
    .card:hover {
      transform: translateY(-8px) scale(1.02);
      box-shadow: 0 16px 36px rgba(36,50,49,0.12);
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 4px;
      transition: var(--transition);
    }

    .card.c-bulletin::before { background: var(--c-bulletin); }
    .card.c-grades::before { background: var(--c-grades); }
    .card.c-ledger::before { background: var(--c-ledger); }

    .card.c-bulletin:hover { border-color: var(--c-bulletin); }
    .card.c-grades:hover { border-color: var(--c-grades); }
    .card.c-ledger:hover { border-color: var(--c-ledger); }

    /* 卡片分類狀態標籤 */
    .card-badge {
      display: inline-block;
      font-size: 0.72rem;
      font-weight: 600;
      padding: 4px 10px;
      border-radius: 12px;
      margin-bottom: 16px;
      letter-spacing: 0.04em;
    }
    .card.c-bulletin .card-badge {
      background: rgba(26,93,87,0.08);
      color: var(--c-bulletin);
    }
    .card.c-grades .card-badge {
      background: rgba(76,114,159,0.08);
      color: var(--c-grades);
    }
    .card.c-ledger .card-badge {
      background: rgba(200,134,42,0.08);
      color: var(--c-ledger);
    }

    /* 圖示設計 */
    .icon-wrapper {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.2rem;
      margin-bottom: 20px;
      transition: var(--transition);
      background: #f7f9f9;
      border: 1px solid var(--c-border);
    }

    .card.c-bulletin:hover .icon-wrapper { background: rgba(26,93,87,0.08); border-color: rgba(26,93,87,0.2); }
    .card.c-grades:hover .icon-wrapper { background: rgba(76,114,159,0.08); border-color: rgba(76,114,159,0.2); }
    .card.c-ledger:hover .icon-wrapper { background: rgba(200,134,42,0.08); border-color: rgba(200,134,42,0.2); }

    /* 文字樣式 */
    .card-title {
      font-size: 1.35rem;
      font-weight: 700;
      color: var(--c-text);
      margin-bottom: 12px;
      letter-spacing: 0.01em;
    }

    .card-desc {
      font-size: 0.92rem;
      color: var(--c-text-muted);
      line-height: 1.6;
      text-align: center;
      margin-bottom: 28px;
      flex-grow: 1;
    }

    /* 按鈕樣式 */
    .card-btn {
      width: 100%;
      padding: 12px 24px;
      border-radius: var(--radius-md);
      font-size: 0.9rem;
      font-weight: 600;
      text-align: center;
      transition: var(--transition);
      border: 1.5px solid transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .card.c-bulletin .card-btn { background: var(--c-bulletin); color: #ffffff; }
    .card.c-bulletin:hover .card-btn { background: var(--c-primary-dark); }
    
    .card.c-grades .card-btn { background: var(--c-grades); color: #ffffff; }
    .card.c-grades:hover .card-btn { background: #3d5c80; }

    .card.c-ledger .card-btn { background: var(--c-ledger); color: #ffffff; }
    .card.c-ledger:hover .card-btn { background: #b07420; }

    /* ── 頁尾資訊 ── */
    footer {
      margin-top: 24px;
      color: var(--c-text-muted);
      font-size: 0.82rem;
      letter-spacing: 0.05em;
    }

    /* ── 進入漸入動畫 ── */
    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    header {
      animation: fadeInUp 0.6s cubic-bezier(0.25, 0.8, 0.25, 1) forwards;
    }

    .card {
      opacity: 0;
      animation: fadeInUp 0.6s cubic-bezier(0.25, 0.8, 0.25, 1) forwards;
    }

    .card:nth-child(1) { animation-delay: 0.1s; }
    .card:nth-child(2) { animation-delay: 0.2s; }
    .card:nth-child(3) { animation-delay: 0.3s; }

    footer {
      opacity: 0;
      animation: fadeInUp 0.6s cubic-bezier(0.25, 0.8, 0.25, 1) forwards;
      animation-delay: 0.4s;
    }

    /* ── RWD 響應式調整 ── */
    @media (max-width: 768px) {
      body {
        padding: 30px 16px;
      }
      h1 {
        font-size: 1.6rem;
      }
      .subtitle {
        font-size: 0.9rem;
        margin-bottom: 24px;
      }
      .grid {
        gap: 20px;
        grid-template-columns: 1fr;
      }
      .card {
        padding: 24px 20px 24px 20px;
      }
      .icon-wrapper {
        width: 64px;
        height: 64px;
        font-size: 1.8rem;
        margin-bottom: 16px;
      }
      .card-title {
        font-size: 1.2rem;
      }
      .card-desc {
        font-size: 0.88rem;
        margin-bottom: 20px;
      }
      .card-badge {
        margin-bottom: 12px;
      }
    }
  </style>
</head>
<body>

  <div class="bg-glow"></div>
  <div class="bg-glow-right"></div>

  <div class="container">
    <!-- 標頭區 -->
    <header>
      <div class="class-badge">臺北市立中正高中</div>
      <h1>高二甲班 資訊整合服務入口</h1>
      <p class="subtitle">歡迎使用高二甲班專屬整合窗口，提供學生與家長便利、即時且透明的班級資訊服務。</p>
    </header>

    <!-- 卡片網格區 -->
    <div class="grid">
      <!-- 📌 電子布告欄 -->
      <a class="card c-bulletin" id="link-bulletin" href="./bulletin.html">
        <span class="card-badge">每日即時更新</span>
        <div class="icon-wrapper">📌</div>
        <div class="card-title">班級電子布告欄</div>
        <div class="card-desc">每日作業、小考範圍、老師交代事項以及學校行政公告即時發布與查詢。</div>
        <div class="card-btn">
          進入布告欄系統 ➔
        </div>
      </a>

      <!-- 📊 成績查詢系統 -->
      <a class="card c-grades" target="_blank" href="https://script.google.com/a/macros/webmail.ccsh.tp.edu.tw/s/AKfycbwtmiwyFUYcw2_sXZHcjKF8c8AgVHVhb8EnEyN2VyrybyW5PLYMPo577tOSvv8-kPS7NQ/exec">
        <span class="card-badge">需學校 @ccsh 帳號登入</span>
        <div class="icon-wrapper">📊</div>
        <div class="card-title">學生成績查詢系統</div>
        <div class="card-desc">段考成績、平時小考測驗分數與學生學習表現進度即時線上查詢。</div>
        <div class="card-btn">
          開啟成績系統 ↗
        </div>
      </a>

      <!-- 💰 班費查詢系統 -->
      <a class="card c-ledger" target="_blank" href="https://maxchan-stack.github.io/class-fund-ledger/?view=parent&api=AKfycbwBoo653bMsvkZceaXks8x2Ul2GuFJWI5ctXQMkh3vq_YLolAerNJWIv9gRyEnOmvN_Bw">
        <span class="card-badge">定期公開透明</span>
        <div class="icon-wrapper">💰</div>
        <div class="card-title">班費收支查詢系統</div>
        <div class="card-desc">班費明細、支出明細、繳費明細及班費餘額，提供公開透明的財務管道。</div>
        <div class="card-btn">
          開啟班費系統 ↗
        </div>
      </a>
    </div>

    <!-- 頁尾 -->
    <footer>
      <p>© 2026 高二甲班 導師電子化服務平台</p>
    </footer>
  </div>

  <script>
    // ═══════════════════════════════════════════════════════
    //  動態參數轉轉導邏輯
    // ═══════════════════════════════════════════════════════
    // 當老師點選包含 ?admin=... 的整合入口網址時，自動將金鑰傳遞至布告欄卡片
    const urlParams = new URLSearchParams(window.location.search);
    const adminVal = urlParams.get('admin');
    if (adminVal) {
      const bulletinLink = document.getElementById('link-bulletin');
      if (bulletinLink) {
        bulletinLink.href = `./bulletin.html?admin=${encodeURIComponent(adminVal)}`;
      }
    }
  </script>
</body>
</html>
